function compressImage(file) {
  return new Promise(function (resolve, reject) {
    const img = new Image();
    img.onload = function () {
      const max = 1200;
      let w = img.width,
        h = img.height;
      if (w > max || h > max) {
        const k = Math.min(max / w, max / h);
        w = Math.round(w * k);
        h = Math.round(h * k);
      }

      c.height = h;

    };
